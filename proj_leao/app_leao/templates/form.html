<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Nova Conta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; color: #334155; padding: 40px 20px; }

        .form-container { background: white; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto; overflow: hidden; }
        
        .form-header { padding: 20px; border-bottom: 1px solid #e2e8f0; background-color: #f8fafc; }
        .form-header h2 { font-size: 18px; font-weight: 600; color: #0f172a; }
        .form-header p { font-size: 13px; color: #64748b; margin-top: 4px; }

        .form-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        
        /* Layout em duas colunas para campos curtos */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 12px; font-weight: 600; color: #475569; }
        .form-group input, .form-group textarea { border: 1px solid #cbd5e1; padding: 10px; font-size: 14px; border-radius: 6px; outline: none; color: #1e293b; transition: all 0.2s; }
        .form-group input:focus, .form-group textarea:focus { border-color: #0284c7; box-shadow: 0 0 0 3px rgba(2,132,199,0.1); }
        
        .form-group textarea { resize: vertical; min-height: 80px; font-family: inherit; }

        .form-actions { padding: 20px 24px; background-color: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 12px; }
        
        .btn { padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-cancel { background-color: white; border: 1px solid #cbd5e1; color: #475569; }
        .btn-cancel:hover { background-color: #f1f5f9; }
        .btn-submit { background-color: #0284c7; border: none; color: white; }
        .btn-submit:hover { background-color: #0369a1; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h2>Cadastrar Lançamento</h2>
        <p>Preencha os campos abaixo para incluir uma nova conta a pagar.</p>
    </div>

    <form action="" method="POST">
        {% csrf_token %}
        
        <div class="form-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="vencimento">Data de Vencimento *</label>
                    <input type="date" id="vencimento" name="vencimento" required>
                </div>
                <div class="form-group">
                    <label for="valor">Valor (R$) *</label>
                    <input type="number" id="valor" step="0.01" name="valor" placeholder="0,00" required>
                </div>
            </div>

            <div class="form-group">
                <label for="fornecedor">Fornecedor *</label>
                <input type="text" id="fornecedor" name="fornecedor" placeholder="Ex: Equatorial Energia" required>
            </div>

            <div class="form-group">
                <label for="categoria">Categoria *</label>
                <input type="text" id="categoria" name="categoria" placeholder="Ex: Energia Elétrica" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="banco">Banco / Meio de Pagamento</label>
                    <input type="text" id="banco" name="banco" placeholder="Ex: Mercado Pago">
                </div>
                <div class="form-group">
                    <label for="parcela">Parcela</label>
                    <input type="text" id="parcela" name="parcela" value="1/1">
                </div>
            </div>

            <div class="form-group">
                <label for="observacao">Observação</label>
                <textarea id="observacao" name="observacao" placeholder="Informações adicionais sobre este pagamento..."></textarea>
            </div>
        </div>

        <div class="form-actions">
            <a href="" class="btn btn-cancel">Cancelar</a>
            <button type="submit" class="btn btn-submit">Salvar Registro</button>
        </div>
    </form>
</div>

</body>
</html>
