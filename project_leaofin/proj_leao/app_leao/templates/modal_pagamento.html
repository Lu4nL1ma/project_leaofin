<div id="statusModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3>Atualizar Pagamento</h3>
            <button type="button" class="close-modal-btn" onclick="fecharModal()">&times;</button>
        </div>
        
        <form id="statusForm">
            {% csrf_token %}
            <input type="hidden" id="modal-item-id" name="item_id">
            <input type="hidden" name="status" value="Pago">
            
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 16px;">
                
                <div class="modal-resumo-conta" style="background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 6px; font-size: 14px; color: #334155;">
                    <div style="margin-bottom: 4px;"><strong>Fornecedor:</strong> <span id="modal-texto-fornecedor">-</span></div>
                    <div style="display: flex; justify-content: space-between;">
                        <div><strong>Vencimento:</strong> <span id="modal-texto-vencimento">-</span></div>
                        <div><strong>Valor:</strong> <span id="modal-texto-valor" style="font-weight: 600; color: #0f172a;">-</span></div>
                    </div>
                </div>

                <p style="font-size: 13px; color: #64748b; margin-top: -4px; margin-bottom: 4px;">
                    Confirmando o pagamento desta conta. Preencha os dados abaixo:
                </p>

                <div>
                    <label for="modal-data-input" style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px;">Data do Pagamento</label>
                    <input type="date" id="modal-data-input" name="ultimo_pagamento" required style="width: 100%; height: 36px; padding: 0 8px; border-radius: 4px; border: 1px solid #cbd5e1; outline: none; box-sizing: border-box;">
                </div>

                <div>
                    <label for="modal-conta-input" style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px;">Banco de Pagamento</label>
                    <select id="modal-conta-input" name="conta_origem" required style="width: 100%; height: 36px; padding: 0 8px; border: 1px solid #cbd5e1; border-radius: 4px; background-color: white; font-size: 14px; color: #1e293b; outline: none; box-sizing: border-box; cursor: pointer;">
                        <option value="" disabled selected>Selecione a conta debitada...</option>
                        {% for banco in bancos_disponiveis %}
                            <option value="{{ banco.nome }}">{{ banco.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="modal-juros-input" style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px;">Juros do Pagamento (R$)</label>
                    <input type="number" step="0.01" min="0" id="modal-juros-input" name="juros" placeholder="0.00" style="width: 100%; height: 36px; padding: 0 8px; border-radius: 4px; border: 1px solid #cbd5e1; outline: none; box-sizing: border-box;">
                </div>
            </div>
            
            <div class="modal-footer" style="margin-top: 20px;">
                <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button type="submit" class="btn-salvar-modal" style="background-color: #16a34a;">Confirmar Pagamento</button>
            </div>
        </form>
    </div>
</div>
