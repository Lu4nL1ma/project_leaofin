{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema Finanças</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: inherit;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        .login-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }
        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-header h2 {
            margin: 0;
            font-size: 22px;
            color: #1e293b;
            font-weight: 700;
        }
        .login-header p {
            margin: 6px 0 0 0;
            font-size: 14px;
            color: #64748b;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }
        .form-control {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            font-size: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #0284c7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }
        .btn-login {
            width: 100%;
            height: 38px;
            background-color: #1e293b;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-login:hover {
            background-color: #334155;
        }
        .error-alert {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
            list-style: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            
            <div class="login-header">
                <h2>Leão Financeiro</h2>
                <p>Entre com suas credenciais de acesso</p>
            </div>

            <!-- Exibição de erros de login inválido -->
            {% if messages %}
                {% for message in messages %}
                    <div class="error-alert">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login_usuario' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Seu usuário..." required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Sua senha..." required>
                </div>

                <button type="submit" class="btn-login">Acessar Sistema</button>
            </form>

        </div>
    </div>

</body>
</html>
