<!-- Modal de Importação de Planilha XLSX (2 Passos) -->
<div id="modalUpload" class="modal-overlay" style="display: none;">
    <div class="modal-card-upload">
        
        <!-- PASSO 1: FORMULÁRIO DE SELEÇÃO E DRAG & DROP -->
        <div id="modalStepUpload" class="modal-step active">
            <div class="modal-header">
                <h3>Importar Contas a Pagar (.xlsx)</h3>
                <button type="button" class="btn-close-modal" onclick="fecharModalUpload()">&times;</button>
            </div>

            <div class="modal-body">
                <form method="POST" enctype="multipart/form-data" action="{% url 'importar_xlsx' %}" id="formUploadXlsx">
                    {% csrf_token %}

                    <div class="modal-dropzone" id="dropzoneXlsx">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
                            <path d="M7.646.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 1.707V11.5a.5.5 0 0 1-1 0V1.707L5.354 3.854a.5.5 0 1 1-.708-.708z"/>
                        </svg>
                        <span id="textoDropzone">Arraste o arquivo .xlsx aqui ou clique para selecionar</span>
                        
                        <input
                            type="file"
                            id="arquivo_xlsx"
                            name="arquivo_xlsx"
                            accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                            style="display: none;"
                        >
                        
                        <div class="modal-file-name" id="nomeArquivoXlsx"></div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-modal-cancel" onclick="fecharModalUpload()">Cancelar</button>
                        <button type="submit" class="btn-salvar-modal" id="btnImportar">Importar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- PASSO 2: EXIBIÇÃO DOS RESULTADOS (Injetado via JS) -->
        <div id="modalStepResultado" class="modal-step" style="display: none;">
            <div class="modal-header">
                <h3 id="tituloResultado">Resultado da Importação</h3>
                <button type="button" class="btn-close-modal" onclick="fecharModalUpload()">&times;</button>
            </div>

            <div class="modal-body">
                <!-- O JavaScript injetará a grid com os números e erros aqui -->
                <div id="conteudoResultado"></div>

                <div class="modal-actions">
                    <button type="button" class="btn-modal-cancel" onclick="voltarParaUpload()">Nova Importação</button>
                    <button type="button" class="btn-salvar-modal" onclick="concluirEAtualizar()">Concluir</button>
                </div>
            </div>
        </div>

    </div>
</div>
